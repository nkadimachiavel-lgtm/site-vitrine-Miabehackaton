            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen">
<!-- Top Navigation Shell -->
<header class="sticky top-0 z-50 flex justify-between items-center w-full px-5 py-3 bg-white/95 backdrop-blur-md shadow-sm dark:shadow-none border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center h-10 w-10 rounded-full hover:bg-slate-50 transition-colors text-blue-900">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tighter text-blue-900 dark:text-white">Nouvelle transaction</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-slate-500" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="max-w-md mx-auto px-container-padding py-xl">
<!-- Progress/Header Visual -->
<div class="mb-xl text-center">
<div class="inline-flex items-center justify-center p-4 bg-primary-container text-on-primary-container rounded-full mb-md shadow-lg">
<span class="material-symbols-outlined text-[32px]" data-icon="account_balance_wallet" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<p class="font-body-md text-on-surface-variant">Configurez les détails du transfert sécurisé.</p>
</div>
<!-- Form Section -->
<form class="space-y-lg">
<!-- Type Dropdown -->
<div class="space-y-base">
<label class="block font-label-caps text-label-caps text-on-surface-variant px-1 uppercase">Type de transaction</label>
<div class="relative">
<select class="w-full h-14 pl-md pr-xl bg-white border border-outline-variant rounded-xl appearance-none focus:ring-2 focus:ring-primary focus:border-primary font-body-lg text-on-surface transition-all shadow-sm">
<option value="Vente">Vente</option>
<option value="Achat">Achat</option>
<option value="Paiement Partenaire">Paiement Partenaire</option>
</select>
<div class="absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Destinataire -->
<div class="space-y-base">
<label class="block font-label-caps text-label-caps text-on-surface-variant px-1 uppercase">Destinataire</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400" data-icon="phone_iphone">phone_iphone</span>
<input class="w-full h-14 pl-12 pr-md bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary font-body-lg text-on-surface transition-all shadow-sm" placeholder="Ex: +242 06 123 4567" type="tel"/>
</div>
</div>
<!-- Montant -->
<div class="space-y-base">
<label class="block font-label-caps text-label-caps text-on-surface-variant px-1 uppercase">Montant</label>
<div class="relative">
<input class="w-full h-14 pl-md pr-16 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary font-body-lg text-on-surface transition-all shadow-sm" placeholder="0" type="number"/>
<div class="absolute right-md top-1/2 -translate-y-1/2 font-bold text-primary-container">
                        FCFA
                    </div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-md">
<button class="w-full py-4 bg-secondary-container hover:brightness-95 active:scale-[0.98] text-primary font-bold rounded-full shadow-lg transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Enregistrer
                </button>
</div>
</form>
<!-- Blockchain Feedback Card -->
<div class="mt-xl p-md bg-white border border-slate-100 rounded-xl flex items-start gap-sm shadow-[0_4px_20px_rgba(10,61,98,0.05)]">
<div class="flex-shrink-0 w-8 h-8 bg-on-tertiary-container/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container text-[20px]" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div>
<p class="font-body-md font-semibold text-on-surface">Transaction sécurisée</p>
<p class="text-[12px] text-on-surface-variant leading-tight">Transaction enregistrée sur la blockchain pour une transparence totale.</p>
</div>
</div>
<!-- Decorative Illustration -->
<div class="mt-xl rounded-2xl overflow-hidden shadow-sm h-32 relative">
<img alt="Blockchain Secure Mesh" class="w-full h-full object-cover" data-alt="abstract digital mesh network with glowing blue nodes and geometric lines representing a secure distributed ledger on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXd8NY37nlERo_q0BpgaNUgFKOJSkTL67ljCVqAUojYtGnC88YqMOLvMZKzKHFL9Pn_dOcenjf2wvVdw1hgJ_mtiZycWfCzQfOlvIYvqED6JCyJNyC3fZjsitL0jsz1M6NHuiwEqNkIuT532tHJxevSUyNdzpKHqReJlqM6omKD0onSnP95Czw7AvdD4JDsIJnH-8nIH0B36p8LSMOQ7QGawjpid6wfAHgiJzrnSpCSdJxigLaMnMLibGN5qbAANZl691o5ks_EY0"/>
<div class="absolute inset-0 bg-gradient-to-r from-white/80 to-transparent flex items-center px-lg">
<span class="text-xs font-bold text-blue-900 tracking-widest uppercase opacity-60">Digital Integrity</span>
</div>
</div>
</main>
<!-- Bottom Navigation (Filtered for Top Level Destination - Inactive in Form View as per shell suppression rule for transactional pages, but keeping for layout context as requested by JSON structure if applicable) -->

<div class="h-16"></div> <!-- Spacer for scrolling -->
</body></html>
